<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anjani & Varun Ram — December 11–12, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Great+Vibes&family=Noto+Serif+Telugu:wght@300;400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* THEME VARS - Marigold & Lavender (default) */
body.theme-marigold {
  --bg: #fdf6f0;
  --bg2: #f9eef8;
  --text: #2d1f3a;
  --text2: #6b4e7a;
  --primary: #b07ec8;
  --primary-deep: #7c4d9e;
  --gold: #c8913a;
  --gold-light: #e8bf7a;
  --saffron: #e07830;
  --rose: #d4648c;
  --cream: #fdf6f0;
  --border: rgba(176,126,200,0.25);
  --mandala: rgba(200,145,58,0.12);
}
body.theme-crimson {
  --bg: #fdf0f2;
  --bg2: #f8e8ec;
  --text: #2a1018;
  --text2: #7a3048;
  --primary: #c85878;
  --primary-deep: #9c2848;
  --gold: #c8a040;
  --gold-light: #e8d080;
  --saffron: #e06820;
  --rose: #e87098;
  --cream: #fdf0f2;
  --border: rgba(200,88,120,0.25);
  --mandala: rgba(200,160,64,0.12);
}
body.theme-midnight {
  --bg: #0e0a1a;
  --bg2: #16102a;
  --text: #f0e8ff;
  --text2: #c8b8e8;
  --primary: #a888d8;
  --primary-deep: #d4b0ff;
  --gold: #e8c060;
  --gold-light: #f0d898;
  --saffron: #f09040;
  --rose: #e888b8;
  --cream: #1a142e;
  --border: rgba(168,136,216,0.3);
  --mandala: rgba(232,192,96,0.1);
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 3rem; height: 64px;
  background: rgba(253,246,240,0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}
body.theme-midnight nav { background: rgba(14,10,26,0.9); }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; letter-spacing: 0.08em; color: var(--primary-deep); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--gold); }
.nav-mobile-btn { display: none; background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(--text2); }
@media(max-width:768px){ .nav-links { display: none; } .nav-mobile-btn { display: block; } }

/* WATERCOLOR BLOBS */
.wc-blob {
  position: absolute; border-radius: 50%; filter: blur(60px); pointer-events: none; mix-blend-mode: multiply;
}
body.theme-midnight .wc-blob { mix-blend-mode: screen; }


/* COLORED SECTION BACKGROUNDS */
#intro { background: linear-gradient(135deg, #f9eef8 0%, #fdf0e8 100%); }
#story { background: linear-gradient(160deg, #fdf6f0 0%, #f0eeff 100%); }
#celebrations { background: linear-gradient(135deg, #fff8e8 0%, #fef0f5 100%); }
#oleander { background: linear-gradient(160deg, #f0faf0 0%, #e8f4ff 100%); }
#travel { background: linear-gradient(135deg, #fff4e8 0%, #f8eeff 100%); }
#clothing { background: linear-gradient(160deg, #fff0f5 0%, #fffae8 100%); }
#gallery { background: linear-gradient(135deg, #f0f8ff 0%, #fff0f8 100%); }
#faq { background: linear-gradient(160deg, #f8fff0 0%, #f0f4ff 100%); }
#rsvp { background: linear-gradient(135deg, #fffae8 0%, #f8f0ff 100%); }
body.theme-midnight #intro, body.theme-midnight #story, body.theme-midnight #celebrations,
body.theme-midnight #oleander, body.theme-midnight #travel, body.theme-midnight #clothing,
body.theme-midnight #gallery, body.theme-midnight #faq, body.theme-midnight #rsvp { background: var(--bg2); }

/* EVENT CARDS 2x2 */
.event-card { border: none; border-radius: 16px; padding: 2rem; position: relative; overflow: hidden;
  background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  transition: transform 0.2s, box-shadow 0.2s; }
.event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }

/* GALLERY LIGHTBOX */
.gallery-item { cursor: pointer; border-radius: 8px; overflow: hidden; aspect-ratio: 1;
  transition: transform 0.2s, box-shadow 0.2s; }
.gallery-item:hover { transform: scale(1.03); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
.gallery-item.tall { grid-row: span 2; aspect-ratio: unset; }
.lightbox-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999;
  display:flex; align-items:center; justify-content:center; padding:2rem; cursor:pointer; }
.lightbox-close { position:fixed; top:1.5rem; right:2rem; color:white; font-size:2.5rem;
  cursor:pointer; line-height:1; z-index:1000; }

/* STORY TRAVEL THEME */
.story-path-container { position:relative; margin-top:3rem; }
.story-items { display:flex; flex-direction:column; gap:0; position:relative; z-index:1; }
.story-item { display:grid; grid-template-columns:52px 1fr; gap:0 1.5rem; padding-bottom:3.5rem; align-items:start; }
.story-dot { width:52px; height:52px; border-radius:50%; background:var(--gold-light); border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.story-img-placeholder { margin-top:0.75rem; height:90px; border-radius:8px;
  background:linear-gradient(135deg, var(--bg2), var(--bg)); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; gap:0.5rem;
  font-size:0.7rem; color:var(--text2); letter-spacing:0.05em; }

/* SECTIONS */
section { position: relative; overflow: hidden; }
.section-inner { max-width: 1100px; margin: 0 auto; padding: 6rem 2rem; position: relative; z-index: 1; }

/* DIVIDER - mehndi style */
.mehndi-divider {
  display: flex; align-items: center; gap: 1rem; margin: 2rem 0;
}
.mehndi-divider::before, .mehndi-divider::after {
  content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.mehndi-divider span { color: var(--gold); font-size: 1.2rem; }

/* SECTION TITLE */
.section-eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); color: var(--primary-deep); line-height: 1.15; }
.section-subtitle { font-size: 1rem; color: var(--text2); line-height: 1.8; max-width: 600px; margin-top: 1rem; }

/* HERO */
#hero {
  position: relative; overflow: hidden;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  background-color: var(--bg);
  background-image: url(uploads/hero-desktop.png);
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
}
.hero-card {
  position: relative; z-index: 1;
  text-align: center;
  padding: 2.5rem 2.75rem;
  max-width: 880px;
  background: rgba(253,246,240,0.42);
  backdrop-filter: blur(8px) saturate(108%);
  -webkit-backdrop-filter: blur(8px) saturate(108%);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 28px;
  box-shadow: 0 10px 40px rgba(60,40,80,0.12);
}
@media(max-width:640px){ .hero-card { padding: 1.75rem 1.25rem; border-radius: 20px; } }
.hero-card, .hero-card * {
  text-shadow:
    0 1px 2px rgba(60,40,80,0.18),
    0 0 14px rgba(253,246,240,0.6);
}
.hero-card .hero-names {
  text-shadow:
    0 2px 6px rgba(60,40,80,0.22),
    0 0 24px rgba(253,246,240,0.55);
}
.hero-names {
  font-family: 'Great Vibes', 'Cormorant Garamond', cursive;
  font-size: clamp(3.5rem, 9vw, 7rem);
  font-weight: 400; letter-spacing: 0.01em;
  color: #b07825;
  line-height: 1.1;
}
.hero-amp {
  display: block; font-style: normal; font-size: 0.6em;
  color: var(--rose); margin: -0.05em 0;
}
.hero-date { font-size: 0.85rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--primary-deep); margin-top: 1.5rem; font-weight: 500; }
.hero-venue { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.3rem; color: var(--primary-deep); margin-top: 0.4rem; }
.countdown { display: flex; gap: 2rem; justify-content: center; margin-top: 2.5rem; }
.countdown-unit { text-align: center; }
.countdown-num { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; color: var(--primary-deep); line-height: 1; }
.countdown-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); }
.scroll-cue { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 1.5rem; animation: bobble 2s ease-in-out infinite; }
@keyframes bobble { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }

/* PETAL ANIMATION */
.petal { position: absolute; pointer-events: none; border-radius: 50% 0 50% 0; opacity: 0.6; animation: fall linear infinite; top: -40px; }
@keyframes fall {
  0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.8; }
  80% { opacity: 0.6; }
  100% { transform: translateY(102vh) rotate(780deg) translateX(var(--drift, 60px)); opacity: 0; }
}

/* GANESHA */
#ganesha { background: var(--bg2); }
.ganesha-inner { display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center; width: 100%; }
.ganesha-title {
  font-family: 'Cormorant Garamond', serif; font-size: clamp(1rem, 2vw, 1.4rem);
  letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.5rem;
}
.ganesha-devanagari {
  font-family: 'Tiro Devanagari Hindi', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); color: var(--gold);
  margin-bottom: 0.3rem; text-shadow: 0 0 30px var(--gold-light); text-align: center;
}
.ganesha-telugu {
  font-family: 'Noto Serif Telugu', serif; font-size: clamp(1.2rem, 2.5vw, 1.8rem);
  color: var(--gold); opacity: 0.8; margin-bottom: 1rem;
}
.ganesha-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; color: var(--primary-deep); max-width: 500px; }

/* STORY */
#story { background: var(--bg); }
.story-timeline { display: flex; flex-direction: column; gap: 0; margin-top: 3rem; max-width: 700px; }
.story-item { display: flex; gap: 2rem; padding-bottom: 3rem; position: relative; }
.story-item::before { content: ''; position: absolute; left: 19px; top: 40px; bottom: 0; width: 1px; background: linear-gradient(to bottom, var(--gold), transparent); }
.story-item:last-child::before { display: none; }
.story-dot { width: 40px; height: 40px; border-radius: 50%; background: var(--gold-light); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.story-content { padding-top: 0.5rem; }
.story-year { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); }
.story-heading { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--primary-deep); margin: 0.25rem 0 0.5rem; }
.story-text { font-size: 0.9rem; color: var(--text2); line-height: 1.8; }

/* CELEBRATIONS */
#celebrations { background: var(--bg2); }
.event-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 3rem; }
@media(max-width:640px){ .event-cards { grid-template-columns: 1fr; } }
.event-card {
  border: 1px solid var(--border); border-radius: 12px; padding: 2rem;
  background: linear-gradient(135deg, var(--bg), var(--bg2));
  transition: transform 0.2s, box-shadow 0.2s;
}
.event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px var(--border); }
.event-day { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
.event-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--primary-deep); margin: 0.3rem 0; }
.event-type { font-style: italic; color: var(--text2); font-size: 0.9rem; margin-bottom: 1.2rem; }
.event-detail { display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 0.75rem; }
.event-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.1rem; }
.event-detail-text { font-size: 0.85rem; color: var(--text2); line-height: 1.5; }

/* OLEANDER */
#oleander { background: var(--bg); }
.farm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-top: 3rem; align-items: start; }
@media(max-width:768px){ .farm-grid { grid-template-columns: 1fr; } }
.farm-img-placeholder {
  aspect-ratio: 4/3; border-radius: 12px; overflow: hidden;
  background: linear-gradient(135deg, var(--bg2), var(--bg));
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.75rem; color: var(--text2); font-size: 0.8rem; letter-spacing: 0.1em;
  position: relative;
}
.farm-features { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
.farm-feature { display: flex; gap: 1rem; align-items: flex-start; }
.farm-feature-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--mandala); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.farm-feature-text h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--primary-deep); }
.farm-feature-text p { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }

/* GALLERY */
#gallery { background: var(--bg2); }
.gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 3rem; }
@media(max-width:640px){ .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
.gallery-placeholder {
  aspect-ratio: 1; border-radius: 8px;
  background: linear-gradient(135deg, var(--bg), var(--bg2));
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.4rem; font-size: 0.7rem; color: var(--text2); letter-spacing: 0.1em;
}
.gallery-placeholder.tall { grid-row: span 2; aspect-ratio: unset; }

/* RSVP */
#rsvp { background: var(--bg); }
.rsvp-form { max-width: 560px; margin-top: 3rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
@media(max-width:480px){ .form-row { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.form-group label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); }
.form-group input, .form-group select, .form-group textarea {
  padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.btn-primary {
  display: inline-block; padding: 0.9rem 2.5rem;
  background: linear-gradient(135deg, var(--primary-deep), var(--primary));
  color: white; border: none; border-radius: 50px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
.rsvp-success { text-align: center; padding: 3rem; }
.rsvp-success .big-check { font-size: 3rem; margin-bottom: 1rem; }

/* FAQ */
#faq { background: var(--bg2); }
.faq-list { max-width: 700px; margin-top: 2.5rem; }
.faq-item { border-bottom: 1px solid var(--border); }
.faq-q {
  width: 100%; text-align: left; padding: 1.25rem 0; background: none; border: none; cursor: pointer;
  font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--primary-deep);
  display: flex; justify-content: space-between; align-items: center;
}
.faq-q:hover { color: var(--gold); }
.faq-a { font-size: 0.9rem; color: var(--text2); line-height: 1.8; padding-bottom: 1.25rem; }

/* WEDDING PARTY */
#party { background: var(--bg); }
.party-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
.party-card { text-align: center; }
.party-avatar {
  width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 0.75rem;
  background: linear-gradient(135deg, var(--primary), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: white;
  border: 3px solid var(--gold-light);
}
.party-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--primary-deep); }
.party-role { font-size: 0.75rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }

/* TRAVEL */
#travel { background: var(--bg2); }
.travel-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 3rem; }
@media(max-width:640px){ .travel-cards { grid-template-columns: 1fr; } }
.travel-card { border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; background: var(--bg); }
.travel-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--primary-deep); margin-bottom: 0.5rem; }
.travel-card p { font-size: 0.85rem; color: var(--text2); line-height: 1.7; }
.travel-tag { display: inline-block; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.2rem 0.7rem; border-radius: 20px; background: var(--mandala); color: var(--gold); margin-bottom: 0.75rem; }

/* FOOTER */
footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 3rem 2rem; text-align: center; }
.footer-names { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--primary-deep); }
.footer-sub { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); margin-top: 0.5rem; }

/* RESPONSIVE GRIDS */
.bio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.5rem; }
.attire-grid { display: grid; grid-template-columns: 1fr 1fr; }
@media (max-width: 600px) {
  .attire-grid { grid-template-columns: 1fr; }
  .attire-grid > div:first-child { border-right: none !important; border-bottom: 1px solid var(--border); }
}

/* MOBILE TUNING */
@media (max-width: 768px) {
  nav { padding: 0 1.5rem; }
  .section-inner { padding: 4.5rem 1.5rem; }
}
@media (max-width: 640px) {
  nav { padding: 0 1.25rem; }
  .section-inner { padding: 4rem 1.25rem; }
  .hero-names { letter-spacing: 0.02em; }
  .hero-date { font-size: 0.75rem; letter-spacing: 0.2em; }
  .hero-venue { font-size: 1.05rem; }
  .countdown { gap: 1.1rem; margin-top: 1.75rem; }
  .countdown-num { font-size: 2.1rem; }
  .countdown-label { font-size: 0.6rem; }
  .footer-names { font-size: 1.6rem; }
  footer { padding: 2.5rem 1.25rem; }
  .section-title { font-size: clamp(1.8rem, 7vw, 2.6rem); }
}
@media (max-width: 480px) {
  nav { padding: 0 1rem; height: 56px; }
  .section-inner { padding: 3.5rem 1rem; }
  .countdown { gap: 0.7rem; }
  .countdown-num { font-size: 1.7rem; }
  .countdown-label { font-size: 0.55rem; letter-spacing: 0.1em; }
}
</style>
</head>
<body class="theme-marigold">

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── WATERCOLOR FLORA HELPERS ────────────────────────────────────────────────
function DelphiniumSpike({ x, y, len, dir = 1 }) {
  return (
    <g>
      <path d={`M${x} ${y-22} Q${x+dir*4} ${y+len*5} ${x-dir*5} ${y+len*10}`}
        stroke="#4a6e2c" strokeWidth="1.4" fill="none" opacity="0.55"/>
      {Array.from({length:len}).map((_,j) => {
        const dy = y + j*9;
        const dx = x + ((j%2===0?2:-2) + dir*j*0.4);
        const tone = j<2 ? '#a0c0e8' : j<5 ? '#5278b8' : '#2e509c';
        const halo = j<2 ? '#d0e0f2' : j<5 ? '#a8c0e0' : '#7898c8';
        return (
          <g key={j}>
            <circle cx={dx} cy={dy} r="6.5" fill={halo} opacity="0.32" filter="url(#wc-soft)"/>
            <ellipse cx={dx-2.6} cy={dy} rx="2.4" ry="1.7" fill={halo} opacity="0.88"/>
            <ellipse cx={dx+2.6} cy={dy} rx="2.4" ry="1.7" fill={halo} opacity="0.88"/>
            <ellipse cx={dx} cy={dy-2} rx="2.4" ry="1.7" fill={halo} opacity="0.88"/>
            <ellipse cx={dx} cy={dy+2} rx="2.4" ry="1.7" fill={halo} opacity="0.88"/>
            <ellipse cx={dx} cy={dy} rx="4.6" ry="3.2" fill={tone} opacity="0.92"/>
            <circle cx={dx-1} cy={dy-0.8} r="1.4" fill="#fff8d0" opacity="0.85"/>
          </g>
        );
      })}
    </g>
  );
}

function WCRose({ cx, cy, r = 14, hue = 'pink' }) {
  const palettes = {
    pink:  ['#f0b8ce','#e0709c','#a83458','#7c1840'],
    coral: ['#f5b8a8','#e8826a','#a84228','#7c2010'],
    cream: ['#fff0d0','#f0d8a8','#c89048','#a06820'],
    red:   ['#e87080','#c83040','#8c1820','#5c0810'],
  };
  const p = palettes[hue] || palettes.pink;
  return (
    <g transform={`translate(${cx},${cy})`}>
      <ellipse rx={r*1.35} ry={r*1.1} fill={p[0]} opacity="0.5" filter="url(#wc-soft)"/>
      {[18,90,162,234,306].map(deg => (
        <ellipse key={deg}
          cx={r*0.5*Math.cos((deg-90)*Math.PI/180)}
          cy={r*0.5*Math.sin((deg-90)*Math.PI/180)}
          rx={r*0.55} ry={r*0.42}
          fill={p[1]} opacity="0.85"
          transform={`rotate(${deg})`}/>
      ))}
      {[54,126,198,270,342].map(deg => (
        <ellipse key={deg}
          cx={r*0.28*Math.cos((deg-90)*Math.PI/180)}
          cy={r*0.28*Math.sin((deg-90)*Math.PI/180)}
          rx={r*0.36} ry={r*0.26}
          fill={p[2]} opacity="0.82"
          transform={`rotate(${deg})`}/>
      ))}
      <ellipse rx={r*0.22} ry={r*0.16} fill={p[3]} opacity="0.95"/>
      <ellipse cx={-r*0.08} cy={-r*0.08} rx={r*0.07} ry={r*0.05} fill="#fff" opacity="0.55"/>
    </g>
  );
}

function WCMarigold({ cx, cy, r = 10 }) {
  return (
    <g transform={`translate(${cx},${cy})`}>
      <circle r={r*1.2} fill="#fcd070" opacity="0.45" filter="url(#wc-soft)"/>
      {Array.from({length:10}).map((_,i)=>{
        const a = i*36;
        return <ellipse key={i}
          cx={r*0.55*Math.cos(a*Math.PI/180)}
          cy={r*0.55*Math.sin(a*Math.PI/180)}
          rx={r*0.42} ry={r*0.3}
          fill="#e89020" opacity="0.85"
          transform={`rotate(${a})`}/>;
      })}
      {Array.from({length:8}).map((_,i)=>{
        const a = i*45 + 22;
        return <ellipse key={i}
          cx={r*0.32*Math.cos(a*Math.PI/180)}
          cy={r*0.32*Math.sin(a*Math.PI/180)}
          rx={r*0.32} ry={r*0.22}
          fill="#f8b438" opacity="0.9"
          transform={`rotate(${a})`}/>;
      })}
      <circle r={r*0.22} fill="#a85808" opacity="0.85"/>
    </g>
  );
}

function WCWhiteBloom({ cx, cy, r = 8 }) {
  return (
    <g transform={`translate(${cx},${cy})`}>
      {[0,72,144,216,288].map(deg => (
        <ellipse key={deg}
          cx={r*0.5*Math.cos(deg*Math.PI/180)}
          cy={r*0.5*Math.sin(deg*Math.PI/180)}
          rx={r*0.4} ry={r*0.3}
          fill="#fff8ee" opacity="0.95"
          transform={`rotate(${deg+90})`}/>
      ))}
      <circle r={r*0.22} fill="#f8c850" opacity="0.95"/>
      <circle r={r*0.1} fill="#a86810" opacity="0.7"/>
    </g>
  );
}

function WCBougainvillea({ cx, cy, r = 12, color = '#e8408c' }) {
  return (
    <g transform={`translate(${cx},${cy})`}>
      <circle r={r*1.1} fill={color} opacity="0.28" filter="url(#wc-soft)"/>
      {[0,72,144,216,288].map((deg,i) => (
        <path key={i}
          d={`M0 0 L${r*0.55} ${-r*0.45} L${r*0.7} 0 L${r*0.5} ${r*0.3} Z`}
          fill={color} opacity={0.85 - i*0.05}
          transform={`rotate(${deg})`}/>
      ))}
      <circle r="1.6" fill="#fbe070"/>
      {[0,120,240].map((deg,i) => (
        <circle key={i}
          cx={r*0.55*Math.cos(deg*Math.PI/180)}
          cy={r*0.55*Math.sin(deg*Math.PI/180)}
          r="1.2" fill="#fbe070"/>
      ))}
    </g>
  );
}

function WCLeaf({ cx, cy, len = 22, rotate = 0, color = '#5a8038' }) {
  return (
    <g transform={`translate(${cx},${cy}) rotate(${rotate})`}>
      <path d={`M0 0 Q${len*0.36} ${-len*0.45} 0 ${-len} Q${-len*0.36} ${-len*0.45} 0 0Z`}
        fill={color} opacity="0.88" filter="url(#wc-edge)"/>
      <path d={`M0 -2 L0 ${-len+2}`} stroke="#365528" strokeWidth="0.6" opacity="0.55"/>
      {[0.25,0.5,0.75].map((t,i) => {
        const dy = -len*t;
        const side = i%2===0 ? 1 : -1;
        return <path key={i}
          d={`M0 ${dy} Q${side*len*0.1} ${dy-len*0.04} ${side*len*0.2} ${dy-len*0.08}`}
          stroke="#365528" strokeWidth="0.45" fill="none" opacity="0.4"/>;
      })}
    </g>
  );
}

function Bird({ x, y, size = 9 }) {
  return (
    <path d={`M${x} ${y} q${size*0.4} ${-size*0.55} ${size*0.8} 0 q${size*0.4} ${-size*0.55} ${size*0.8} 0`}
      stroke="#5a6878" strokeWidth="1.3" fill="none" opacity="0.55" strokeLinecap="round"/>
  );
}

function Butterfly({ x, y, size = 11, color = '#c89878' }) {
  return (
    <g transform={`translate(${x},${y})`}>
      <ellipse cx={-size*0.32} cy={-size*0.12} rx={size*0.42} ry={size*0.32} fill={color} opacity="0.7"/>
      <ellipse cx={size*0.32}  cy={-size*0.12} rx={size*0.42} ry={size*0.32} fill={color} opacity="0.7"/>
      <ellipse cx={-size*0.25} cy={size*0.22}  rx={size*0.3}  ry={size*0.22} fill={color} opacity="0.6"/>
      <ellipse cx={size*0.25}  cy={size*0.22}  rx={size*0.3}  ry={size*0.22} fill={color} opacity="0.6"/>
      <ellipse cx="0" cy="0" rx="1.2" ry={size*0.5} fill="#3a2818"/>
      <circle cx={-size*0.32} cy={-size*0.12} r={size*0.07} fill="#fff" opacity="0.5"/>
      <circle cx={size*0.32}  cy={-size*0.12} r={size*0.07} fill="#fff" opacity="0.5"/>
    </g>
  );
}

function MandalaBg({ size=500, opacity=0.06 }) {
  const rings = [40,80,120,160,200,240];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{position:'absolute',pointerEvents:'none',opacity}}>
      {rings.map((r,i)=>(
        <React.Fragment key={i}>
          <circle cx={size/2} cy={size/2} r={r} stroke="var(--gold)" strokeWidth="1" fill="none"/>
          {Array.from({length:12*(i+1)}).map((_,j)=>{
            const a = (j / (12*(i+1))) * Math.PI*2;
            const x1 = size/2 + (r-6)*Math.cos(a), y1 = size/2 + (r-6)*Math.sin(a);
            const x2 = size/2 + (r+6)*Math.cos(a), y2 = size/2 + (r+6)*Math.sin(a);
            return <line key={j} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--gold)" strokeWidth="0.5" opacity="0.7"/>;
          })}
        </React.Fragment>
      ))}
    </svg>
  );
}

function Petals() {
  const items = Array.from({length:45}, (_,i) => {
    const type = i % 5;
    return {
      id: i,
      left: `${(i/45)*100 + (Math.random()-0.5)*8}%`,
      size: type===2 ? 6 + Math.random()*6 : 7 + Math.random()*14,
      delay: Math.random()*16,
      duration: 7 + Math.random()*10,
      color: type===0?'var(--rose)':type===1?'var(--gold)':type===2?'var(--primary)':type===3?'var(--saffron)':'var(--gold-light)',
      shape: type===2 ? '50%' : type===4 ? '50% 0 50% 0' : '60% 40% 40% 60% / 60% 30% 70% 40%',
      drift: (Math.random()-0.5)*120,
    };
  });
  return (
    <>
      {items.map(p => (
        <div key={p.id} className="petal" style={{
          left: p.left, width: p.size, height: p.size*0.65,
          background: p.color,
          borderRadius: p.shape,
          animationDelay: `${p.delay}s`,
          animationDuration: `${p.duration}s`,
          '--drift': `${p.drift}px`,
        }}/>
      ))}
    </>
  );
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
function Countdown() {
  const [time, setTime] = useState({days:0,hours:0,mins:0,secs:0});
  useEffect(() => {
    const target = new Date('2026-12-12T06:00:00'); // Muhurtum
    const tick = () => {
      const now = new Date(), diff = target - now;
      if (diff <= 0) { setTime({days:0,hours:0,mins:0,secs:0}); return; }
      setTime({
        days: Math.floor(diff/86400000),
        hours: Math.floor((diff%86400000)/3600000),
        mins: Math.floor((diff%3600000)/60000),
        secs: Math.floor((diff%60000)/1000),
      });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  return (
    <div className="countdown">
      {[['days','Days'],['hours','Hours'],['mins','Mins'],['secs','Secs']].map(([k,l])=>(
        <div key={k} className="countdown-unit">
          <div className="countdown-num">{String(time[k]).padStart(2,'0')}</div>
          <div className="countdown-label">{l}</div>
        </div>
      ))}
    </div>
  );
}

    {q:'Will both days be outdoors?', a:'The events will make the most of Oleander Farms\' stunning natural setting in Karjat. Parts of both days will be outdoors, so we recommend comfortable footwear for the lawns and light layers for the cool December evenings.'},
    {q:'Are children welcome?', a:'Children are warmly welcome at both celebrations!'},
    {q:'Is there a registry?', a:'Your presence is truly the only gift we need. If you\'d like to give something, we\'d appreciate contributions to our travel fund — more details to follow.'},
    {q:'Can I take photos?', a:'Please enjoy taking photos throughout the celebrations! We do ask that during the sacred ceremony moments, you put phones away and be fully present with us.'},
    {q:'What is the nearest airport?', a:'Mumbai CSIA (BOM) and the new Navi Mumbai International Airport (NMIA) are both about 90 minutes away. Karjat is also accessible by train from Mumbai CST. Transport will be arranged for all guests.'},
    {q:'When will I receive my room details?', a:'Our planner will share your room details closer to the wedding date — no need to worry about it!'},
  ];
  return (
    <section id="faq">
      <div className="wc-blob" style={{width:400,height:400,bottom:'-80px',right:'-80px',background:'var(--primary)',opacity:0.07}}/>
      <div className="section-inner">
        <div className="section-eyebrow">Questions</div>
        <div className="section-title">Frequently Asked</div>
        <div className="faq-list">
          {faqs.map((f,i) => (
            <div key={i} className="faq-item">
              <button className="faq-q" onClick={() => setOpen(open===i?null:i)}>
                {f.q} <span style={{color:'var(--gold)',fontSize:'1.4rem',lineHeight:1}}>{open===i?'−':'+'}</span>
              </button>
              {open===i && <div className="faq-a">{f.a}</div>}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── RSVP ─────────────────────────────────────────────────────────────────────
// Replace the entries below with your real guest list. One entry per "head of party".
// `count` is the total people in that party — they'll be RSVP'd for both Dec 11 & Dec 12.
const PARTY_LIST = /*EDITME-PARTIES-BEGIN*/[
  { id:'sample-rao',     name:'The Rao Family',       count:4 },
  { id:'sample-doe',     name:'Jane Doe',             count:1 },
  { id:'sample-smith',   name:'John & Mary Smith',    count:2 },
  { id:'sample-patel',   name:'The Patel Family',     count:5 },
  { id:'sample-kumar',   name:'Priya Kumar',          count:2 },
  { id:'sample-iyer',    name:'The Iyer Family',      count:3 },
]/*EDITME-PARTIES-END*/;

const RSVP_CONTACT = /*EDITME-CONTACT-BEGIN*/{
  email: 'anjanivarunwedding@gmail.com',
  contacts: [
    { name: 'Anjani Agrawal',      phone: '+1 832-853-9365' },
    { name: 'Archna Agrawal',      phone: '+1 832-671-3177' },
    { name: 'Varun Khandavalli',   phone: '+1 (908) 500-2944' },
    { name: 'Ratnasri Khandavalli', phone: '+1 908-872-9153' },
  ],
}/*EDITME-CONTACT-END*/;

function RSVP() {
  const [search, setSearch] = useState('');
  const [party, setParty] = useState(null);
  const [attendance, setAttendance] = useState('all'); // 'all' | 'partial' | 'none'
  const [partial, setPartial] = useState(1);
  const [names, setNames] = useState('');
  const [diet, setDiet] = useState('');
  const [submitted, setSubmitted] = useState(false);

  const matches = (!party && search.trim())
    ? PARTY_LIST.filter(p => p.name.toLowerCase().includes(search.toLowerCase().trim())).slice(0, 8)
    : [];

  const select = (p) => { setParty(p); setPartial(p.count); setSearch(''); };
  const reset = () => { setParty(null); setAttendance('all'); setPartial(1); setNames(''); setDiet(''); };
  const submit = (e) => { e.preventDefault(); setSubmitted(true); };

  const attendingCount = !party ? 0
    : attendance === 'all' ? party.count
    : attendance === 'partial' ? partial
    : 0;

  return (
    <section id="rsvp">
      <div className="wc-blob" style={{width:500,height:500,top:'-100px',left:'-100px',background:'var(--gold)',opacity:0.07}}/>
      <div className="section-inner">
        <div style={{display:'flex',gap:'4rem',flexWrap:'wrap'}}>
          <div style={{flex:'1',minWidth:280}}>
            <div className="section-eyebrow">You're Invited</div>
            <div className="section-title">RSVP</div>
            <div className="section-subtitle">
              Please find your name below and let us know if you can make it by <strong>September 1, 2026</strong>. All guests are RSVP'd for both the Dec 11 &amp; Dec 12 celebrations.
            </div>
            <div style={{marginTop:'2rem',fontFamily:'Cormorant Garamond, serif',fontSize:'1.6rem',color:'var(--gold)',lineHeight:1.4}}>
              "The joy of celebrating<br/><em>with the people you love</em><br/>is the greatest gift of all."
            </div>
          </div>
          <div style={{flex:'1.2',minWidth:300}}>
            {submitted ? (
              <div className="rsvp-success" style={{padding:'2.5rem 1.5rem'}}>
                <div className="big-check">{attendingCount > 0 ? '🎉' : '💌'}</div>
                <div style={{fontFamily:'Cormorant Garamond, serif',fontSize:'2.1rem',color:'var(--primary-deep)'}}>{attendingCount > 0 ? 'See you there!' : "You'll be missed."}</div>
                <div style={{color:'var(--text2)',marginTop:'0.75rem',fontSize:'0.95rem',lineHeight:1.7,maxWidth:420,margin:'0.75rem auto 0'}}>
                  {attendingCount > 0 ? (
                    <>We've recorded <strong>{attendingCount}</strong> {attendingCount===1?'guest':'guests'} from <strong>{party.name}</strong> for both the Dec 11 &amp; Dec 12 celebrations. We can't wait to celebrate with you!</>
                  ) : (
                    <>Thank you for letting us know, <strong>{party.name}</strong>. We'll miss you, but we deeply appreciate your blessings from afar.</>
                  )}
                </div>
                <button onClick={()=>{setSubmitted(false); reset();}} style={{marginTop:'1.75rem',padding:'0.6rem 1.6rem',borderRadius:24,border:'1px solid var(--border)',background:'transparent',cursor:'pointer',color:'var(--text2)',fontSize:'0.85rem',fontFamily:"'DM Sans',sans-serif"}}>Submit another RSVP</button>
              </div>
            ) : (
              <form className="rsvp-form" onSubmit={submit}>
                {!party ? (
                  <>
                    <div className="form-group">
                      <label>Step 1 — Find your name</label>
                      <input
                        value={search}
                        onChange={e=>setSearch(e.target.value)}
                        placeholder="Type your name or family name..."
                      />
                    </div>
                    {matches.length > 0 && (
                      <div style={{border:'1px solid var(--border)',borderRadius:8,background:'var(--bg2)',marginTop:'-0.5rem',marginBottom:'1rem',maxHeight:280,overflowY:'auto'}}>
                        {matches.map(p => (
                          <button
                            key={p.id} type="button" onClick={()=>select(p)}
                            style={{display:'flex',width:'100%',justifyContent:'space-between',alignItems:'center',padding:'0.8rem 1rem',background:'none',border:'none',borderBottom:'1px solid var(--border)',cursor:'pointer',textAlign:'left',color:'var(--text)'}}>
                            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.05rem'}}>{p.name}</span>
                            <span style={{fontSize:'0.72rem',color:'var(--gold)',letterSpacing:'0.05em'}}>{p.count} {p.count===1?'seat':'seats'}</span>
                          </button>
                        ))}
                      </div>
                    )}
                    {search.trim() && matches.length === 0 && (
                      <div style={{padding:'0.85rem 1rem',background:'var(--bg2)',borderRadius:8,fontSize:'0.85rem',color:'var(--text2)',marginBottom:'1rem',lineHeight:1.6}}>
                        No matches yet — try just your last name, or scroll down to contact us if you can't find your party.
                      </div>
                    )}
                  </>
                ) : (
                  <>
                    <div style={{padding:'1.25rem 1.5rem',background:'linear-gradient(135deg,var(--bg2),var(--bg))',border:'1px solid var(--border)',borderRadius:12,marginBottom:'1.5rem'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'1rem',flexWrap:'wrap'}}>
                        <div>
                          <div style={{fontSize:'0.7rem',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--gold)'}}>Hello</div>
                          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.6rem',color:'var(--primary-deep)',marginTop:'0.2rem',lineHeight:1.2}}>{party.name}</div>
                          <div style={{fontSize:'0.85rem',color:'var(--text2)',marginTop:'0.5rem',lineHeight:1.6}}>
                            We've reserved <strong style={{color:'var(--primary-deep)'}}>{party.count} {party.count===1?'seat':'seats'}</strong> for you across both Dec 11 &amp; Dec 12.
                          </div>
                        </div>
                        <button type="button" onClick={reset} style={{background:'none',border:'none',color:'var(--text2)',fontSize:'0.78rem',cursor:'pointer',textDecoration:'underline'}}>change</button>
                      </div>
                    </div>

                    <div className="form-group">
                      <label>Will you be joining us?</label>
                      <div style={{display:'flex',flexDirection:'column',gap:'0.5rem',marginTop:'0.4rem'}}>
                        {[
                          ['all', `Joyfully accept — all ${party.count} of us will be there ✨`],
                          ['partial', 'Some of us can make it'],
                          ['none', 'Regretfully decline 💌'],
                        ].map(([val,label]) => (
                          <label key={val} style={{display:'flex',alignItems:'center',gap:'0.6rem',padding:'0.75rem 1rem',border:`1px solid ${attendance===val?'var(--primary)':'var(--border)'}`,borderRadius:8,cursor:'pointer',background:attendance===val?'var(--bg2)':'transparent',transition:'all 0.15s'}}>
                            <input type="radio" name="attend" value={val} checked={attendance===val} onChange={()=>setAttendance(val)}/>
                            <span style={{fontSize:'0.9rem',color:'var(--text)'}}>{label}</span>
                          </label>
                        ))}
                      </div>
                    </div>

                    {attendance === 'partial' && (
                      <div className="form-group">
                        <label>How many of you can attend?</label>
                        <select value={partial} onChange={e=>setPartial(parseInt(e.target.value,10))}>
                          {Array.from({length:party.count},(_,i)=>i+1).map(n => (
                            <option key={n} value={n}>{n} of {party.count}</option>
                          ))}
                        </select>
                      </div>
                    )}

                    {attendance !== 'none' && (
                      <>
                        <div className="form-group">
                          <label>Names of attendees {attendance==='partial' && <span style={{textTransform:'none',letterSpacing:0,color:'var(--gold)'}}>(so we know who to expect)</span>}</label>
                          <textarea
                            value={names}
                            onChange={e=>setNames(e.target.value)}
                            placeholder={attendance==='partial' ? 'e.g. Priya, Raj' : 'Optional — full names of all attendees, one per line'}
                            rows={3}
                          />
                        </div>
                        <div className="form-group">
                          <label>Dietary requirements / allergies</label>
                          <textarea
                            value={diet}
                            onChange={e=>setDiet(e.target.value)}
                            placeholder="Vegetarian, vegan, allergies, or any other notes"
                            rows={2}
                          />
                        </div>
                      </>
                    )}

                    <button type="submit" className="btn-primary" style={{marginTop:'0.5rem'}}>
                      {attendance==='none' ? 'Send our regrets 💌' : 'Send RSVP 🪷'}
                    </button>
                  </>
                )}

                <div style={{marginTop:'2rem',padding:'1.1rem 1.25rem',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,fontSize:'0.82rem',color:'var(--text2)',lineHeight:1.7}}>
                  <strong style={{color:'var(--primary-deep)',fontFamily:"'Cormorant Garamond',serif",fontSize:'1rem'}}>Can't find your name, or have an issue?</strong><br/>
                  Email us at <a href={`mailto:${RSVP_CONTACT.email}`} style={{color:'var(--gold)',textDecoration:'none',borderBottom:'1px dotted var(--gold)'}}>{RSVP_CONTACT.email}</a> — or reach any of us directly:
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))',gap:'0.4rem 1rem',marginTop:'0.6rem'}}>
                    {RSVP_CONTACT.contacts.map((c,i) => (
                      <div key={i} style={{display:'flex',justifyContent:'space-between',gap:'0.5rem'}}>
                        <span style={{color:'var(--text2)'}}>{c.name}</span>
                        <a href={`tel:${c.phone.replace(/[\s()-]/g,'')}`} style={{color:'var(--gold)',textDecoration:'none',borderBottom:'1px dotted var(--gold)',whiteSpace:'nowrap'}}>{c.phone}</a>
                      </div>
                    ))}
                  </div>
                </div>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

      <div className="footer-names">Anjani & Varun Ram</div>
      <div style={{display:'flex',justifyContent:'center',gap:'1.5rem',margin:'0.4rem 0',flexWrap:'wrap',opacity:0.7}}>
        <span style={{fontFamily:"'Noto Serif Telugu',serif",fontSize:'1.1rem',color:'var(--primary-deep)'}}>అంజని &amp; వరుణ్</span>
        <span style={{color:'var(--border)'}}>·</span>
        <span style={{fontFamily:"'Tiro Devanagari Hindi',serif",fontSize:'1.1rem',color:'var(--primary-deep)'}}>अंजनि &amp; वरुण</span>

      <div className="footer-sub">December 11–12, 2026 · Oleander Farms, Karjat, India</div>

// ─── TWEAKS ───────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "marigold",
  "showPetals": true,
  "heroSize": 8
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.body.className = `theme-${t.theme}`;
  }, [t.theme]);

  const sections = [
    {id:'ganesha',label:'Blessings'},{id:'intro',label:'About Us'},{id:'story',label:'Our Story'},
    {id:'celebrations',label:'Celebrations'},{id:'oleander',label:'Venue'},
    {id:'travel',label:'Travel'},{id:'clothing',label:'Attire'},
    {id:'gallery',label:'Gallery'},{id:'faq',label:'FAQ'},{id:'rsvp',label:'RSVP'},
  ];

  return (
    <>
      <Nav sections={sections}/>
      <Hero showPetals={t.showPetals}/>
      <GaneshaSection/>
      <CoupleIntro/>
      <OurStory/>
      <Celebrations/>
      <OleanderFarms/>
      <Travel/>
      <Clothing/>
      <Gallery/>
      <FAQ/>
      <RSVP/>
      <Footer/>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Color Theme"/>
        <TweakRadio label="Theme" value={t.theme}
          options={['marigold','crimson','midnight']}
          onChange={v => setTweak('theme', v)}/>
        <TweakSection label="Hero"/>
        <TweakToggle label="Falling Petals" value={t.showPetals}
          onChange={v => setTweak('showPetals', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
