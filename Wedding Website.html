<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anjani & Varun Ram — December 11–12, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Serif+Telugu:wght@300;400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* THEME VARS - Marigold & Lavender (default) */
body.theme-marigold {
  --bg: #fdf6f0;
  --bg2: #f9eef8;
  --text: #2d1f3a;
  --text2: #6b4e7a;
  --primary: #b07ec8;
  --primary-deep: #7c4d9e;
  --gold: #c8913a;
  --gold-light: #e8bf7a;
  --saffron: #e07830;
  --rose: #d4648c;
  --cream: #fdf6f0;
  --border: rgba(176,126,200,0.25);
  --mandala: rgba(200,145,58,0.12);
}
body.theme-crimson {
  --bg: #fdf0f2;
  --bg2: #f8e8ec;
  --text: #2a1018;
  --text2: #7a3048;
  --primary: #c85878;
  --primary-deep: #9c2848;
  --gold: #c8a040;
  --gold-light: #e8d080;
  --saffron: #e06820;
  --rose: #e87098;
  --cream: #fdf0f2;
  --border: rgba(200,88,120,0.25);
  --mandala: rgba(200,160,64,0.12);
}
body.theme-midnight {
  --bg: #0e0a1a;
  --bg2: #16102a;
  --text: #f0e8ff;
  --text2: #c8b8e8;
  --primary: #a888d8;
  --primary-deep: #d4b0ff;
  --gold: #e8c060;
  --gold-light: #f0d898;
  --saffron: #f09040;
  --rose: #e888b8;
  --cream: #1a142e;
  --border: rgba(168,136,216,0.3);
  --mandala: rgba(232,192,96,0.1);
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 3rem; height: 64px;
  background: rgba(253,246,240,0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}
body.theme-midnight nav { background: rgba(14,10,26,0.9); }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; letter-spacing: 0.08em; color: var(--primary-deep); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--gold); }
.nav-mobile-btn { display: none; background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(--text2); }
@media(max-width:768px){ .nav-links { display: none; } .nav-mobile-btn { display: block; } }

/* WATERCOLOR BLOBS */
.wc-blob {
  position: absolute; border-radius: 50%; filter: blur(60px); pointer-events: none; mix-blend-mode: multiply;
}
body.theme-midnight .wc-blob { mix-blend-mode: screen; }


/* COLORED SECTION BACKGROUNDS */
#intro { background: linear-gradient(135deg, #f9eef8 0%, #fdf0e8 100%); }
#story { background: linear-gradient(160deg, #fdf6f0 0%, #f0eeff 100%); }
#celebrations { background: linear-gradient(135deg, #fff8e8 0%, #fef0f5 100%); }
#oleander { background: linear-gradient(160deg, #f0faf0 0%, #e8f4ff 100%); }
#travel { background: linear-gradient(135deg, #fff4e8 0%, #f8eeff 100%); }
#clothing { background: linear-gradient(160deg, #fff0f5 0%, #fffae8 100%); }
#gallery { background: linear-gradient(135deg, #f0f8ff 0%, #fff0f8 100%); }
#faq { background: linear-gradient(160deg, #f8fff0 0%, #f0f4ff 100%); }
#rsvp { background: linear-gradient(135deg, #fffae8 0%, #f8f0ff 100%); }
body.theme-midnight #intro, body.theme-midnight #story, body.theme-midnight #celebrations,
body.theme-midnight #oleander, body.theme-midnight #travel, body.theme-midnight #clothing,
body.theme-midnight #gallery, body.theme-midnight #faq, body.theme-midnight #rsvp { background: var(--bg2); }

/* EVENT CARDS 2x2 */
.event-card { border: none; border-radius: 16px; padding: 2rem; position: relative; overflow: hidden;
  background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  transition: transform 0.2s, box-shadow 0.2s; }
.event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }

/* GALLERY LIGHTBOX */
.gallery-item { cursor: pointer; border-radius: 8px; overflow: hidden; aspect-ratio: 1;
  transition: transform 0.2s, box-shadow 0.2s; }
.gallery-item:hover { transform: scale(1.03); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
.gallery-item.tall { grid-row: span 2; aspect-ratio: unset; }
.lightbox-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999;
  display:flex; align-items:center; justify-content:center; padding:2rem; cursor:pointer; }
.lightbox-close { position:fixed; top:1.5rem; right:2rem; color:white; font-size:2.5rem;
  cursor:pointer; line-height:1; z-index:1000; }

/* STORY TRAVEL THEME */
.story-path-container { position:relative; margin-top:3rem; }
.story-items { display:flex; flex-direction:column; gap:0; position:relative; z-index:1; }
.story-item { display:grid; grid-template-columns:52px 1fr; gap:0 1.5rem; padding-bottom:3.5rem; align-items:start; }
.story-dot { width:52px; height:52px; border-radius:50%; background:var(--gold-light); border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.story-img-placeholder { margin-top:0.75rem; height:90px; border-radius:8px;
  background:linear-gradient(135deg, var(--bg2), var(--bg)); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; gap:0.5rem;
  font-size:0.7rem; color:var(--text2); letter-spacing:0.05em; }

/* SECTIONS */
section { position: relative; overflow: hidden; }
.section-inner { max-width: 1100px; margin: 0 auto; padding: 6rem 2rem; position: relative; z-index: 1; }

/* DIVIDER - mehndi style */
.mehndi-divider {
  display: flex; align-items: center; gap: 1rem; margin: 2rem 0;
}
.mehndi-divider::before, .mehndi-divider::after {
  content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.mehndi-divider span { color: var(--gold); font-size: 1.2rem; }

/* SECTION TITLE */
.section-eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); color: var(--primary-deep); line-height: 1.15; }
.section-subtitle { font-size: 1rem; color: var(--text2); line-height: 1.8; max-width: 600px; margin-top: 1rem; }

/* HERO */
#hero {
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; background: var(--bg);
}
.hero-names {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.5rem, 10vw, 8rem);
  font-weight: 300; letter-spacing: 0.03em;
  color: var(--primary-deep);
  line-height: 1;
}
.hero-amp {
  display: block; font-style: italic; font-size: 0.55em;
  color: var(--gold); margin: 0.1em 0;
}
.hero-date { font-size: 0.85rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text2); margin-top: 1.5rem; }
.hero-venue { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.3rem; color: var(--rose); margin-top: 0.4rem; }
.countdown { display: flex; gap: 2rem; justify-content: center; margin-top: 2.5rem; }
.countdown-unit { text-align: center; }
.countdown-num { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; color: var(--primary-deep); line-height: 1; }
.countdown-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); }
.scroll-cue { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 1.5rem; animation: bobble 2s ease-in-out infinite; }
@keyframes bobble { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }

/* PETAL ANIMATION */
.petal { position: absolute; pointer-events: none; border-radius: 50% 0 50% 0; opacity: 0.6; animation: fall linear infinite; top: -40px; }
@keyframes fall {
  0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.8; }
  80% { opacity: 0.6; }
  100% { transform: translateY(102vh) rotate(780deg) translateX(var(--drift, 60px)); opacity: 0; }
}

/* GANESHA */
#ganesha { background: var(--bg2); }
.ganesha-inner { display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center; width: 100%; }
.ganesha-title {
  font-family: 'Cormorant Garamond', serif; font-size: clamp(1rem, 2vw, 1.4rem);
  letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.5rem;
}
.ganesha-devanagari {
  font-family: 'Tiro Devanagari Hindi', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); color: var(--primary-deep);
  margin-bottom: 0.3rem; text-shadow: 0 0 30px var(--gold-light); text-align: center;
}
.ganesha-telugu {
  font-family: 'Noto Serif Telugu', serif; font-size: clamp(1.2rem, 2.5vw, 1.8rem);
  color: var(--gold); opacity: 0.8; margin-bottom: 1rem;
}
.ganesha-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; color: var(--text2); max-width: 500px; }

/* STORY */
#story { background: var(--bg); }
.story-timeline { display: flex; flex-direction: column; gap: 0; margin-top: 3rem; max-width: 700px; }
.story-item { display: flex; gap: 2rem; padding-bottom: 3rem; position: relative; }
.story-item::before { content: ''; position: absolute; left: 19px; top: 40px; bottom: 0; width: 1px; background: linear-gradient(to bottom, var(--gold), transparent); }
.story-item:last-child::before { display: none; }
.story-dot { width: 40px; height: 40px; border-radius: 50%; background: var(--gold-light); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.story-content { padding-top: 0.5rem; }
.story-year { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); }
.story-heading { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--primary-deep); margin: 0.25rem 0 0.5rem; }
.story-text { font-size: 0.9rem; color: var(--text2); line-height: 1.8; }

/* CELEBRATIONS */
#celebrations { background: var(--bg2); }
.event-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 3rem; }
@media(max-width:640px){ .event-cards { grid-template-columns: 1fr; } }
.event-card {
  border: 1px solid var(--border); border-radius: 12px; padding: 2rem;
  background: linear-gradient(135deg, var(--bg), var(--bg2));
  transition: transform 0.2s, box-shadow 0.2s;
}
.event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px var(--border); }
.event-day { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
.event-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--primary-deep); margin: 0.3rem 0; }
.event-type { font-style: italic; color: var(--text2); font-size: 0.9rem; margin-bottom: 1.2rem; }
.event-detail { display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 0.75rem; }
.event-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.1rem; }
.event-detail-text { font-size: 0.85rem; color: var(--text2); line-height: 1.5; }

/* OLEANDER */
#oleander { background: var(--bg); }
.farm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-top: 3rem; align-items: start; }
@media(max-width:768px){ .farm-grid { grid-template-columns: 1fr; } }
.farm-img-placeholder {
  aspect-ratio: 4/3; border-radius: 12px; overflow: hidden;
  background: linear-gradient(135deg, var(--bg2), var(--bg));
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.75rem; color: var(--text2); font-size: 0.8rem; letter-spacing: 0.1em;
  position: relative;
}
.farm-features { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
.farm-feature { display: flex; gap: 1rem; align-items: flex-start; }
.farm-feature-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--mandala); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.farm-feature-text h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--primary-deep); }
.farm-feature-text p { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }

/* GALLERY */
#gallery { background: var(--bg2); }
.gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 3rem; }
@media(max-width:640px){ .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
.gallery-placeholder {
  aspect-ratio: 1; border-radius: 8px;
  background: linear-gradient(135deg, var(--bg), var(--bg2));
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.4rem; font-size: 0.7rem; color: var(--text2); letter-spacing: 0.1em;
}
.gallery-placeholder.tall { grid-row: span 2; aspect-ratio: unset; }

/* RSVP */
#rsvp { background: var(--bg); }
.rsvp-form { max-width: 560px; margin-top: 3rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
@media(max-width:480px){ .form-row { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.form-group label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); }
.form-group input, .form-group select, .form-group textarea {
  padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.btn-primary {
  display: inline-block; padding: 0.9rem 2.5rem;
  background: linear-gradient(135deg, var(--primary-deep), var(--primary));
  color: white; border: none; border-radius: 50px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
.rsvp-success { text-align: center; padding: 3rem; }
.rsvp-success .big-check { font-size: 3rem; margin-bottom: 1rem; }

/* FAQ */
#faq { background: var(--bg2); }
.faq-list { max-width: 700px; margin-top: 2.5rem; }
.faq-item { border-bottom: 1px solid var(--border); }
.faq-q {
  width: 100%; text-align: left; padding: 1.25rem 0; background: none; border: none; cursor: pointer;
  font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--primary-deep);
  display: flex; justify-content: space-between; align-items: center;
}
.faq-q:hover { color: var(--gold); }
.faq-a { font-size: 0.9rem; color: var(--text2); line-height: 1.8; padding-bottom: 1.25rem; }

/* WEDDING PARTY */
#party { background: var(--bg); }
.party-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
.party-card { text-align: center; }
.party-avatar {
  width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 0.75rem;
  background: linear-gradient(135deg, var(--primary), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: white;
  border: 3px solid var(--gold-light);
}
.party-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--primary-deep); }
.party-role { font-size: 0.75rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }

/* TRAVEL */
#travel { background: var(--bg2); }
.travel-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 3rem; }
@media(max-width:640px){ .travel-cards { grid-template-columns: 1fr; } }
.travel-card { border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; background: var(--bg); }
.travel-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--primary-deep); margin-bottom: 0.5rem; }
.travel-card p { font-size: 0.85rem; color: var(--text2); line-height: 1.7; }
.travel-tag { display: inline-block; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.2rem 0.7rem; border-radius: 20px; background: var(--mandala); color: var(--gold); margin-bottom: 0.75rem; }

/* FOOTER */
footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 3rem 2rem; text-align: center; }
.footer-names { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--primary-deep); }
.footer-sub { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); margin-top: 0.5rem; }
</style>
</head>
<body class="theme-marigold">

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── OLEANDER WATERCOLOR LANDSCAPE ───────────────────────────────────────────
function OleanderLandscape() {
  return (
    <svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg"
      style={{position:'absolute',inset:0,width:'100%',height:'100%'}}
      preserveAspectRatio="xMidYMid slice">
      <defs>
        {/* Crisp watercolor edge — less displacement, more definition */}
        <filter id="wc-edge" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence type="fractalNoise" baseFrequency="0.03 0.02" numOctaves="3" seed="12" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="wc-mist" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="14"/>

          <feGaussianBlur stdDeviation="4"/>
        </filter>
        <filter id="wc-sharp" x="-2%" y="-2%" width="104%" height="104%">
          <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
        </filter>

        {/* Golden-hour Karjat sky */}
        <linearGradient id="karjat-sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#ddd0f0" stopOpacity="0.95"/>
          <stop offset="35%" stopColor="#ecd8e8" stopOpacity="0.9"/>
          <stop offset="70%" stopColor="#f5e0c8" stopOpacity="0.88"/>
          <stop offset="100%" stopColor="#f8e8b0" stopOpacity="0.82"/>
        </linearGradient>
        {/* River gradient */}
        <linearGradient id="ulhas" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#c0d8f0" stopOpacity="0.6"/>
          <stop offset="30%" stopColor="#d8e8ff" stopOpacity="0.75"/>
          <stop offset="60%" stopColor="#c8d8f8" stopOpacity="0.7"/>
          <stop offset="100%" stopColor="#b8d0e8" stopOpacity="0.55"/>
        </linearGradient>
        {/* Deep Sahyadri forest */}
        <linearGradient id="forest-deep" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#2d5a3a" stopOpacity="0.75"/>
          <stop offset="100%" stopColor="#3d7a4a" stopOpacity="0.55"/>
        </linearGradient>
        <linearGradient id="forest-mid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3a6840" stopOpacity="0.65"/>
          <stop offset="100%" stopColor="#5a9060" stopOpacity="0.5"/>

        <React.Fragment key={i}>
          <circle cx={size/2} cy={size/2} r={r} stroke="var(--gold)" strokeWidth="1" fill="none"/>
          {Array.from({length:12*(i+1)}).map((_,j)=>{
            const a = (j / (12*(i+1))) * Math.PI*2;
            const x1 = size/2 + (r-6)*Math.cos(a), y1 = size/2 + (r-6)*Math.sin(a);
            const x2 = size/2 + (r+6)*Math.cos(a), y2 = size/2 + (r+6)*Math.sin(a);
            return <line key={j} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--gold)" strokeWidth="0.5" opacity="0.7"/>;
          })}
        </React.Fragment>
      ))}
    </svg>
  );
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
function Countdown() {
  const [time, setTime] = useState({days:0,hours:0,mins:0,secs:0});
  useEffect(() => {
    const target = new Date('2026-12-12T06:00:00'); // Muhurtum
    const tick = () => {
      const now = new Date(), diff = target - now;
      if (diff <= 0) { setTime({days:0,hours:0,mins:0,secs:0}); return; }
      setTime({
        days: Math.floor(diff/86400000),
        hours: Math.floor((diff%86400000)/3600000),
        mins: Math.floor((diff%3600000)/60000),
        secs: Math.floor((diff%60000)/1000),
      });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  return (
    <div className="countdown">
      {[['days','Days'],['hours','Hours'],['mins','Mins'],['secs','Secs']].map(([k,l])=>(
        <div key={k} className="countdown-unit">
          <div className="countdown-num">{String(time[k]).padStart(2,'0')}</div>
          <div className="countdown-label">{l}</div>
        </div>
      ))}
    </div>
  );
}

            <div style={{width:320,height:280,background:'linear-gradient(135deg,var(--bg2),var(--bg))',borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'0.75rem',margin:'0 auto 1rem'}}>
              <svg width="44" height="44" viewBox="0 0 44 44"><rect width="44" height="44" rx="5" fill="none" stroke="var(--border)" strokeWidth="1.5"/><circle cx="14" cy="14" r="5" stroke="var(--gold)" strokeWidth="1.2" fill="none"/><path d="M4 36 L14 22 L22 28 L30 18 L40 36" stroke="var(--primary)" strokeWidth="1.5" fill="none"/></svg>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.3rem',color:'var(--primary-deep)'}}>{photos[lightbox].label}</div>
              <div style={{fontSize:'0.75rem',color:'var(--text2)',opacity:0.6}}>Photo coming soon — check back closer to the date!</div>
            </div>
            <button onClick={()=>setLightbox(null)} style={{padding:'0.5rem 1.5rem',borderRadius:'20px',border:'1px solid var(--border)',background:'none',cursor:'pointer',color:'var(--text2)',fontSize:'0.85rem'}}>Close</button>
          </div>
        </div>
      )}
      <div className="section-inner">
        <div className="section-eyebrow">Memories</div>
        <div className="section-title">Our Gallery</div>
        <div className="section-subtitle">Photos coming soon — click any photo to preview.</div>
        <div className="gallery-grid">
          {photos.map((p,i) => (
            <div key={i} className={`gallery-item ${p.tall?'tall':''}`} onClick={()=>setLightbox(i)}>
              <div className="gallery-placeholder" style={{height:'100%',minHeight:160}}>
                <svg width="36" height="36" viewBox="0 0 36 36"><rect width="36" height="36" rx="4" fill="none" stroke="var(--border)" strokeWidth="1.5"/><circle cx="12" cy="12" r="4" stroke="var(--gold)" strokeWidth="1" fill="none"/><path d="M4 28 L12 18 L18 22 L24 16 L32 28" stroke="var(--primary)" strokeWidth="1.5" fill="none"/></svg>
                <span style={{fontSize:'0.68rem',textAlign:'center',padding:'0 0.5rem'}}>{p.label}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── RSVP ─────────────────────────────────────────────────────────────────────
function RSVP() {
  const [form, setForm] = useState({name:'',email:'',guests:'1',attending:'yes',diet:'',events:[]});
  const [submitted, setSubmitted] = useState(false);
  const set = (k,v) => setForm(f => ({...f, [k]:v}));
  const toggleEvent = (e) => {
    setForm(f => ({...f, events: f.events.includes(e) ? f.events.filter(x=>x!==e) : [...f.events,e]}));
  };
  const submit = (e) => { e.preventDefault(); setSubmitted(true); };
  return (
    <section id="rsvp">
      <div className="wc-blob" style={{width:500,height:500,top:'-100px',left:'-100px',background:'var(--gold)',opacity:0.07}}/>
      <div className="section-inner">
        <div style={{display:'flex',gap:'4rem',flexWrap:'wrap'}}>
          <div style={{flex:'1',minWidth:280}}>
            <div className="section-eyebrow">You're Invited</div>
            <div className="section-title">RSVP</div>
            <div className="section-subtitle">Please let us know if you can make it by <strong>September 1, 2026</strong>. We can't wait to celebrate with you!</div>
            <div style={{marginTop:'2rem',fontFamily:'Cormorant Garamond, serif',fontSize:'1.6rem',color:'var(--gold)',lineHeight:1.4}}>
              "The joy of celebrating<br/><em>with the people you love</em><br/>is the greatest gift of all."
            </div>
          </div>
          <div style={{flex:'1.2',minWidth:300}}>
            {submitted ? (
              <div className="rsvp-success">
                <div className="big-check">🎉</div>
                <div style={{fontFamily:'Cormorant Garamond, serif',fontSize:'2rem',color:'var(--primary-deep)'}}>See you there!</div>
                <div style={{color:'var(--text2)',marginTop:'0.5rem',fontSize:'0.9rem'}}>Thank you, we've received your RSVP and can't wait to celebrate with you!</div>
              </div>
            ) : (
              <form className="rsvp-form" onSubmit={submit}>
                <div className="form-row">
                  <div className="form-group">
                    <label>Full Name</label>
                    <input required value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Your name"/>
                  </div>
                  <div className="form-group">
                    <label>Email</label>
                    <input type="email" required value={form.email} onChange={e=>set('email',e.target.value)} placeholder="your@email.com"/>
                  </div>
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label>Attending?</label>
                    <select value={form.attending} onChange={e=>set('attending',e.target.value)}>
                      <option value="yes">Joyfully Accept!</option>
                      <option value="no">Regretfully Decline</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Number of Guests</label>
                    <select value={form.guests} onChange={e=>set('guests',e.target.value)}>
                      {['1','2','3','4'].map(n => <option key={n} value={n}>{n}</option>)}
                    </select>
                  </div>
                </div>
                {form.attending === 'yes' && (
                  <div className="form-group">
                    <label>Which events will you attend?</label>
                    <div style={{display:'flex',gap:'0.75rem',flexWrap:'wrap',marginTop:'0.25rem'}}>
                      {['Mehndi & Sangeet (Dec 11)','Wedding Ceremony (Dec 12)'].map(ev => (
                        <label key={ev} style={{display:'flex',alignItems:'center',gap:'0.4rem',cursor:'pointer',fontSize:'0.85rem',color:'var(--text2)'}}>
                          <input type="checkbox" checked={form.events.includes(ev)} onChange={()=>toggleEvent(ev)}/>
                          {ev}
                        </label>
                      ))}
                    </div>
                  </div>
                )}
                <div className="form-group">
                  <label>Dietary Requirements</label>
                  <input value={form.diet} onChange={e=>set('diet',e.target.value)} placeholder="Vegetarian, allergies, etc."/>
                </div>
                <button type="submit" className="btn-primary">Send RSVP 🪷</button>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

function App() {

  const sections = [

  return (
    <>

      <GaneshaSection/>
      <CoupleIntro/>
      <OurStory/>
      <Celebrations/>
      <OleanderFarms/>
      <Travel/>
      <Clothing/>
      <Gallery/>

      <RSVP/>
